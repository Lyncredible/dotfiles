# quick reload
bind r source-file ~/.tmux.conf \; display "Reloaded!"

set -g mouse on

set-option -g history-limit 50000
setw -g mode-keys vi

# Windows and panes start at 1
set -g base-index 1
setw -g pane-base-index 1

# Status bar with system stats and whereami context
set -g status-right-length 80
set -g status-right "#(~/.local/bin/tmux-sysstat) | #(~/.local/bin/whereami)"

# Forward terminal title from inner shell to outer terminal
set -g set-titles on
set -g set-titles-string "#T"

# True color support
if-shell "infocmp xterm-ghostty >/dev/null 2>&1" \
  "set -g default-terminal xterm-ghostty; set -ga terminal-overrides ',xterm-ghostty:Tc'"

# Dynamic color by environment
run-shell "~/.local/bin/tmux-set-colors"

# split current window horizontally
bind "|" split-window -h
bind "\\" split-window -h

# split current window vertically
bind "_" split-window -v
bind "-" split-window -v
